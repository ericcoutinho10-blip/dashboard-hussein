<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IA - Dr. Hussein Awada</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); background: #5a67d8; }
        .error {
            background: #ef4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .success {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .dashboard-container { display: none; }
        .navbar {
            background: #1e293b;
            padding: 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .navbar h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-buttons button { width: auto; padding: 8px 16px; }
        .refresh-btn { background: #10b981; }
        .logout-btn { background: #ef4444; }
        .content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .stat-label { color: #94a3b8; font-size: 14px; margin-bottom: 10px; }
        .stat-value { font-size: 36px; font-weight: bold; color: #667eea; }
        .products-section {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 20px;
            margin-bottom: 30px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .product-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-3px);
            border-color: #667eea;
            background: #1e293b;
        }
        .product-name { font-weight: 600; margin-bottom: 8px; }
        .product-count { font-size: 24px; font-weight: bold; color: #667eea; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .chart-card h3 { margin-bottom: 20px; }
        .chart-container { height: 300px; }
        .table-container {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-whatsapp { background: #25D36620; color: #25D366; }
        .badge-instagram { background: #E4405F20; color: #E4405F; }
        .badge-product { background: #8b5cf620; color: #a78bfa; }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        .debug-info {
            background: #1e293b;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            display: none;
        }
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .products-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-container">
        <div class="login-box">
            <h2>🐘 Dashboard IA</h2>
            <div id="login-error" class="error"></div>
            <div class="input-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <div class="input-group">
                <label>🔒 Senha</label>
                <input type="password" id="password" placeholder="********">
            </div>
            <button onclick="login()">Entrar no Sistema</button>
            <div id="debug-info" class="debug-info"></div>
        </div>
    </div>
    
    <div id="dashboard" class="dashboard-container">
        <div class="navbar">
            <h1>📊 Analytics Dashboard</h1>
            <div class="nav-buttons">
                <button class="refresh-btn" onclick="loadDashboardData()">🔄 Atualizar</button>
                <button class="logout-btn" onclick="logout()">🚪 Sair</button>
            </div>
        </div>
        <div class="content">
            <div id="dashboard-error" class="error"></div>
            <div id="dashboard-success" class="success"></div>
            <div class="stats-grid" id="stats-grid"></div>
            
            <div class="products-section">
                <h3>🎯 Análise por Produto</h3>
                <div class="products-grid" id="products-grid"></div>
                <div id="product-details" style="display: none;"></div>
            </div>
            
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>📊 Volume por Canal</h3>
                    <div class="chart-container"><canvas id="channel-chart"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>📈 Evolução Mensal</h3>
                    <div class="chart-container"><canvas id="evolution-chart"></canvas></div>
                </div>
            </div>
            
            <div class="table-container">
                <h3>💬 Conversas Recentes</h3>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 Buscar por produto, etapa..." onkeyup="filterTable()">
                </div>
                <div style="overflow-x: auto;">
                    <table id="conversas-table">
                        <thead><tr><th>Telefone</th><th>Produto</th><th>Etapa</th><th>Data</th><th>Canal</th></tr></thead>
                        <tbody id="table-body"><tr><td colspan="5" class="empty-state">Carregando...</td></tr></tbody>
                    </table>
                </div>
            </div>
            
            <div class="table-container">
                <h3>🚫 Bloqueios Humanos</h3>
                <div style="overflow-x: auto;">
                    <table id="bloqueios-table">
                        <thead><tr><th>Telefone</th><th>Data</th><th>Status</th></tr></thead>
                        <tbody id="bloqueios-body"><tr><td colspan="3" class="empty-state">Carregando...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://xckqthybbgxdwnjmiced.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhja3F0aHliYmd4ZHduam1pY2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzI4MTAsImV4cCI6MjA5MTg0ODgxMH0.vvBZg0Q62CmF4nSK9JEgf1GXGF35VDVxHJ_B7HOORwQ';
        const supabase = supabaseClient.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allData = [];
        let charts = {};
        
        const PRODUCTS = [
            'Clínica / Consulta',
            'Faculdade da Vida',
            'Curso de Extensão',
            'Curso Jejum',
            'Curso Saúde da Mulher',
            'Comunidade Integrativa',
            'Suporte / Plataforma',
            'Conteúdos Gratuitos'
        ];
        
        // Função de login com debug
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const debugDiv = document.getElementById('debug-info');
            
            errorDiv.style.display = 'none';
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = '🔄 Tentando login...';
            
            console.log('Tentando login com:', email);
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                console.log('Resposta do login:', { data, error });
                
                if (error) {
                    debugDiv.innerHTML = `❌ Erro: ${error.message}`;
                    errorDiv.textContent = `❌ ${error.message}`;
                    errorDiv.style.display = 'block';
                    return;
                }
                
                if (data.user) {
                    debugDiv.innerHTML = `✅ Login bem-sucedido! User: ${data.user.email}`;
                    console.log('Usuário logado:', data.user);
                    
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadDashboardData();
                } else {
                    debugDiv.innerHTML = '❌ Nenhum usuário retornado';
                    errorDiv.textContent = '❌ Falha no login';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error('Erro no login:', err);
                debugDiv.innerHTML = `❌ Erro crítico: ${err.message}`;
                errorDiv.textContent = `❌ Erro: ${err.message}`;
                errorDiv.style.display = 'block';
            }
        }
        
        async function logout() {
            await supabase.auth.signOut();
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }
        
        async function loadDashboardData() {
            const errorDiv = document.getElementById('dashboard-error');
            const successDiv = document.getElementById('dashboard-success');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                successDiv.textContent = '🔄 Carregando dados...';
                successDiv.style.display = 'block';
                
                console.log('Buscando dados do WhatsApp...');
                const { data: wppData, error: wppError } = await supabase
                    .from('conversas_whatsapp')
                    .select('*');
                
                if (wppError) {
                    console.error('Erro WhatsApp:', wppError);
                    throw new Error(`WhatsApp: ${wppError.message}`);
                }
                console.log(`WhatsApp: ${wppData?.length || 0} registros`);
                
                console.log('Buscando dados do Instagram...');
                const { data: igData, error: igError } = await supabase
                    .from('conversas')
                    .select('*');
                
                if (igError) {
                    console.error('Erro Instagram:', igError);
                    throw new Error(`Instagram: ${igError.message}`);
                }
                console.log(`Instagram: ${igData?.length || 0} registros`);
                
                console.log('Buscando bloqueios...');
                const { data: bloqueios, error: bloqError } = await supabase
                    .from('bloqueios_ia')
                    .select('*')
                    .order('bloqueado_em', { ascending: false })
                    .limit(20);
                
                if (bloqError) {
                    console.error('Erro Bloqueios:', bloqError);
                    throw new Error(`Bloqueios: ${bloqError.message}`);
                }
                console.log(`Bloqueios: ${bloqueios?.length || 0} registros`);
                
                // Calcular ativos 24h
                const yesterday = new Date(Date.now() - 86400000).toISOString();
                const ativosWpp = wppData?.filter(d => d.atualizado_em > yesterday).length || 0;
                const ativosIg = igData?.filter(d => d.atualizado_em > yesterday).length || 0;
                
                renderStats(wppData?.length || 0, igData?.length || 0, bloqueios?.length || 0, ativosWpp + ativosIg);
                
                const allConversas = [
                    ...(wppData || []).map(d => ({ ...d, canal: 'WhatsApp' })),
                    ...(igData || []).map(d => ({ ...d, canal: 'Instagram' }))
                ];
                allData = allConversas;
                console.log(`Total conversas: ${allData.length}`);
                
                renderProductsGrid(allConversas);
                renderChannelChart(wppData?.length || 0, igData?.length || 0);
                renderEvolutionChart(allConversas);
                renderProductChart(allConversas);
                renderTable(allConversas);
                renderBloqueios(bloqueios || []);
                
                successDiv.textContent = `✅ Dados carregados! (${allData.length} conversas)`;
                setTimeout(() => { successDiv.style.display = 'none'; }, 3000);
                
            } catch (error) {
                console.error('Erro detalhado:', error);
                errorDiv.textContent = `❌ Erro: ${error.message}`;
                errorDiv.style.display = 'block';
            }
        }
        
        function renderStats(wpp, ig, bloqueios, ativos) {
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><div class="stat-label">💬 WhatsApp</div><div class="stat-value">${wpp}</div></div>
                <div class="stat-card"><div class="stat-label">📸 Instagram</div><div class="stat-value">${ig}</div></div>
                <div class="stat-card"><div class="stat-label">🚫 Bloqueios</div><div class="stat-value">${bloqueios}</div></div>
                <div class="stat-card"><div class="stat-label">⚡ Ativas 24h</div><div class="stat-value">${ativos}</div></div>
            `;
        }
        
        function renderProductsGrid(data) {
            const productCounts = {};
            PRODUCTS.forEach(p => { productCounts[p] = data.filter(d => d.produto_interesse === p).length; });
            const total = data.length;
            const grid = document.getElementById('products-grid');
            grid.innerHTML = PRODUCTS.map(p => {
                const count = productCounts[p];
                const percent = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
                return `<div class="product-card" onclick="alert('Produto: ${p}\\nTotal: ${count} conversas\\n${percent}% do total')">
                    <div class="product-name">${p}</div>
                    <div class="product-count">${count}</div>
                    <div style="font-size:12px;color:#64748b;">${percent}%</div>
                </div>`;
            }).join('');
        }
        
        function renderChannelChart(wpp, ig) {
            const ctx = document.getElementById('channel-chart').getContext('2d');
            if (charts.channel) charts.channel.destroy();
            charts.channel = new Chart(ctx, {
                type: 'bar',
                data: { labels: ['WhatsApp', 'Instagram'], datasets: [{ data: [wpp, ig], backgroundColor: ['#25D366', '#E4405F'], borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
        
        function renderEvolutionChart(data) {
            const monthly = {};
            data.forEach(item => {
                if (item.atualizado_em) {
                    const d = new Date(item.atualizado_em);
                    const key = `${d.getFullYear()}-${d.getMonth() + 1}`;
                    monthly[key] = (monthly[key] || 0) + 1;
                }
            });
            const sorted = Object.keys(monthly).sort().slice(-6);
            const labels = sorted.map(k => { const [y,m] = k.split('-'); return new Date(y, m-1).toLocaleString('default', { month: 'short' }); });
            const values = sorted.map(k => monthly[k]);
            const ctx = document.getElementById('evolution-chart').getContext('2d');
            if (charts.evolution) charts.evolution.destroy();
            charts.evolution = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Conversas', data: values, borderColor: '#667eea', tension: 0.4, fill: true }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        
        function renderProductChart(data) {
            const products = {};
            PRODUCTS.forEach(p => { products[p] = data.filter(d => d.produto_interesse === p).length; });
            const ctx = document.getElementById('product-chart')?.getContext('2d');
            if (!ctx) return;
            if (charts.product) charts.product.destroy();
            charts.product = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(products), datasets: [{ data: Object.values(products), backgroundColor: '#667eea', borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } }
            });
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Nenhum dado</td></tr>'; return; }
            tbody.innerHTML = data.slice(0, 50).map(item => `
                <tr>
                    <td>${item.telefone || '-'}</td>
                    <td><span class="badge badge-product">${item.produto_interesse || '-'}</span></td>
                    <td>${item.etapa_funil || '-'}</td>
                    <td>${item.atualizado_em ? new Date(item.atualizado_em).toLocaleString() : '-'}</td>
                    <td><span class="badge ${item.canal === 'WhatsApp' ? 'badge-whatsapp' : 'badge-instagram'}">${item.canal}</span></td>
                </tr>
            `).join('');
        }
        
        function renderBloqueios(data) {
            const tbody = document.getElementById('bloqueios-body');
            if (!data.length) { tbody.innerHTML = '<tr><td colspan="3" class="empty-state">Nenhum bloqueio</td></tr>'; return; }
            tbody.innerHTML = data.map(item => `
                <tr><td>${item.telefone || '-'}</td><td>${item.bloqueado_em ? new Date(item.bloqueado_em).toLocaleString() : '-'}</td><td><span class="badge" style="background:#ef444420;color:#ef4444;">🚫 Bloqueado</span></td></tr>
            `).join('');
        }
        
        function filterTable() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = allData.filter(item => 
                (item.produto_interesse || '').toLowerCase().includes(search) ||
                (item.etapa_funil || '').toLowerCase().includes(search) ||
                (item.telefone || '').toLowerCase().includes(search)
            );
            renderTable(filtered);
        }
        
        // Verificar sessão
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadDashboardData();
            }
        }
        
        checkSession();
    </script>
</body>
</html>
